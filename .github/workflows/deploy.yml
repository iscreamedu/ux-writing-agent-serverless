name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Inject API secrets
        run: |
          mkdir dist
          cp index.html dist/index.html
          sed -i "s/__GEMINI_S__/${{ secrets.GEMINI_S }}/g" dist/index.html
          sed -i "s|__GEMINI_K__|${{ secrets.GEMINI_K }}|g" dist/index.html

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
